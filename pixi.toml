[workspace]
name = "repro-pypi-numpy-openblas-float32-matmul"
version = "0.1.0"
channels = ["conda-forge"]
# macOS entries declare the minimum host OS for conda's solver (__osx virtual
# package) and PyPI macosx wheel tag selection, not necessarily the OS you
# develop on. conda-forge libblas *newaccelerate* builds require __osx >= 15.5.
# Rich platform names are required when overriding macos on a subdir.
platforms = [
    "linux-64",
    "linux-aarch64",
    { name = "osx-64-macos-15-5", platform = "osx-64", macos = "15.5" },
    { name = "osx-arm64-macos-15-5", platform = "osx-arm64", macos = "15.5" },
    { name = "osx-arm64-macos-11-0", platform = "osx-arm64", macos = "11.0" },
    "win-64",
]

[feature.repro.tasks]
repro = "python repro.py"

# Host-only runner (python stdlib) for collect_results.py.
[feature.runner.dependencies]
python = ">=3.11,<3.14"

# NumPy from PyPI wheels — Linux/generic (bundled scipy-openblas on linux-64).
[feature.pypi]
platforms = ["linux-64", "linux-aarch64", "win-64"]

[feature.pypi.dependencies]
python = ">=3.11,<3.14"

[feature.pypi.pypi-dependencies]
numpy = "*"

# NumPy 2.5.0 ships two macOS arm64 cp313 wheels; platform macos version picks:
#   osx-arm64-macos-11-0 → macosx_11_0_arm64, bundled scipy-openblas64 (reproduces)
#   osx-arm64-macos-15-5 → macosx_14_0_arm64, Accelerate (control)
[feature.pypi-openblas]
platforms = ["osx-arm64-macos-11-0"]

[feature.pypi-openblas.dependencies]
python = ">=3.11,<3.14"

[feature.pypi-openblas.pypi-dependencies]
numpy = "*"

[feature.pypi-accelerate]
platforms = ["osx-arm64-macos-15-5"]

[feature.pypi-accelerate.dependencies]
python = ">=3.11,<3.14"

[feature.pypi-accelerate.pypi-dependencies]
numpy = "*"

[feature.openblas-pthreads]
platforms = ["linux-64", "linux-aarch64", "osx-64-macos-15-5", "osx-arm64-macos-15-5", "osx-arm64-macos-11-0", "win-64"]

[feature.openblas-pthreads.dependencies]
python = ">=3.11,<3.14"
libopenblas = { version = "*", build = "*pthreads*" }
numpy = "*"

[feature.openblas-openmp]
platforms = ["linux-64", "linux-aarch64", "osx-64-macos-15-5", "osx-arm64-macos-15-5", "osx-arm64-macos-11-0", "win-64"]

[feature.openblas-openmp.dependencies]
python = ">=3.11,<3.14"
libopenblas = { version = "*", build = "*openmp*" }
numpy = "*"

[feature.newaccelerate]
platforms = ["osx-64-macos-15-5", "osx-arm64-macos-15-5"]

[feature.newaccelerate.dependencies]
python = ">=3.11,<3.14"
libblas = { version = "*", build = "*newaccelerate*" }
liblapack = { version = "*", build = "*newaccelerate*" }
numpy = "*"

[feature.mkl]
platforms = ["linux-64", "osx-64-macos-15-5", "win-64"]

[feature.mkl.dependencies]
python = ">=3.11,<3.14"
libblas = { version = "*", build = "*mkl*" }
liblapack = { version = "*", build = "*mkl*" }
mkl = "*"
numpy = "*"

[environments]
default = { features = ["runner"], solve-group = "runner" }
pypi = { features = ["pypi", "repro"], solve-group = "pypi", no-default-feature = true }
pypi-openblas = { features = ["pypi-openblas", "repro"], solve-group = "pypi-openblas", no-default-feature = true }
pypi-accelerate = { features = ["pypi-accelerate", "repro"], solve-group = "pypi-accelerate", no-default-feature = true }
openblas-pthreads = { features = ["openblas-pthreads", "repro"], solve-group = "openblas-pthreads", no-default-feature = true }
openblas-openmp = { features = ["openblas-openmp", "repro"], solve-group = "openblas-openmp", no-default-feature = true }
newaccelerate = { features = ["newaccelerate", "repro"], solve-group = "newaccelerate", no-default-feature = true }
mkl = { features = ["mkl", "repro"], solve-group = "mkl", no-default-feature = true }

[tasks]
collect = "python collect_results.py"
